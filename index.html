<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kabile Savaşları PRO</title>

<link rel="manifest" href="manifest.json">

<style>
:root {
    --bg-main: #0a0f14;
    --bg-card: #141b24;
    --bg-input: #1c2632;
    --primary: #f6b73c;
    --primary-hover: #e0a228;
    --text-main: #e2e8f0;
    --text-muted: #94a3b8;
    --success: #10b981;
    --danger: #ef4444;
}

body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: var(--bg-main);
    color: var(--text-main);
    line-height: 1.5;
}

.container {
    max-width: 600px;
    margin: auto;
    padding: 20px;
}

.header {
    text-align: center;
    margin-bottom: 25px;
    padding: 20px 0;
}

.header .title-top {
    color: var(--primary);
    font-size: 24px;
    font-weight: 800;
    letter-spacing: 2px;
}

.header .title-sub {
    font-size: 36px;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: 4px;
    margin-top: -5px;
}

.card {
    background: var(--bg-card);
    padding: 24px;
    border-radius: 16px;
    margin-bottom: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    border: 1px solid rgba(246, 183, 60, 0.1);
}

.form-group {
    margin-bottom: 15px;
}

.form-group label {
    display: block;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

input, select {
    width: 100%;
    padding: 12px 14px;
    background: var(--bg-input);
    border: 2px solid transparent;
    border-radius: 8px;
    color: #fff;
    font-size: 15px;
    box-sizing: border-box;
}

input:focus, select:focus {
    outline: none;
    border-color: var(--primary);
}

.grid-3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

button.btn-block {
    width: 100%;
    padding: 14px;
    background: var(--primary);
    color: #000;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 10px;
}

button.btn-block:hover {
    background: var(--primary-hover);
}

.op-card {
    background: var(--bg-card);
    padding: 16px;
    border-radius: 12px;
    margin-bottom: 15px;
    border-left: 4px solid var(--primary);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.op-details {
    flex-grow: 1;
}

.op-type {
    font-size: 18px;
    font-weight: bold;
    color: #fff;
}

.op-target {
    color: var(--primary);
    font-weight: 600;
}

.op-meta {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
}

.op-action {
    text-align: right;
    margin-left: 15px;
}

.timer {
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 8px;
    font-family: monospace;
}

.ok { color: var(--success); }
.err { color: var(--danger); }

.btn-timer {
    background: rgba(246, 183, 60, 0.2);
    color: var(--primary);
    border: 1px solid var(--primary);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    margin-right: 5px;
}

.btn-delete {
    background: rgba(239, 68, 68, 0.1);
    color: var(--danger);
    border: 1px solid rgba(239, 68, 68, 0.2);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
}
</style>
</head>
<body>

<div class="container">

    <div class="header">
        <div class="title-top">⚔ KABİLE SAVAŞLARI ⚔</div>
        <div class="title-sub">PRO</div>
    </div>

    <div class="card">
        <div class="form-group">
            <label>Birim Türü</label>
            <select id="type">
                <option>Ordu</option>
                <option>Misyoner</option>
                <option>Noble</option>
            </select>
        </div>

        <div class="form-group">
            <label>Hedef Koordinat</label>
            <input id="target" placeholder="Örn: 504|491">
        </div>

        <div class="form-group">
            <label>Hedefe Varış Tarihi</label>
            <input id="date" type="date">
        </div>

        <div class="form-group">
            <label>Hedefe Varış Saati</label>
            <div class="grid-3">
                <input id="hour" type="number" placeholder="Saat" min="0" max="23">
                <input id="minute" type="number" placeholder="Dk" min="0" max="59">
                <input id="second" type="number" placeholder="Sn" min="0" max="59">
            </div>
        </div>

        <div class="form-group">
            <label>Tek Yön Yolculuk Süresi</label>
            <input id="travel" placeholder="Örn: 38:06:43">
        </div>

        <div class="form-group">
            <label>Kaç Dakika Önce Uyarsın?</label>
            <select id="warnBefore">
                <option value="0">Tam Zamanında (0 Dk)</option>
                <option value="1">1 Dakika Önce</option>
                <option value="3">3 Dakika Önce</option>
                <option value="5" selected>5 Dakika Önce</option>
                <option value="10">10 Dakika Önce</option>
            </select>
        </div>

        <button class="btn-block" onclick="add()">Saldırı Ekle & Zamanla</button>
    </div>

    <div id="list"></div>

</div>

<script>
let ops = JSON.parse(localStorage.getItem("ks_ops") || "[]");

function saveOps(){
    localStorage.setItem("ks_ops", JSON.stringify(ops));
}

function parseTravel(t){
    let x = t.split(":");
    if(x.length !== 3) return null;
    return (parseInt(x[0])*3600 + parseInt(x[1])*60 + parseInt(x[2])) * 1000;
}

function format(ms){
    return new Date(ms).toLocaleString("tr-TR");
}

function add(){
    let type = document.getElementById("type").value;
    let target = document.getElementById("target").value || "Bilinmeyen Hedef";
    let date = document.getElementById("date").value;
    let hour = parseInt(document.getElementById("hour").value || 0);
    let minute = parseInt(document.getElementById("minute").value || 0);
    let second = parseInt(document.getElementById("second").value || 0);
    let travel = document.getElementById("travel").value;
    let warnMinutes = parseInt(document.getElementById("warnBefore").value);

    if(!date){
        alert("Tarih seçin!");
        return;
    }

    let d = new Date(date);
    d.setHours(hour, minute, second, 0);

    let arrival = d.getTime();
    let travelMs = parseTravel(travel);

    if(!travelMs){
        alert("Süre hatalı! Format -> Saat:Dakika:Saniye");
        return;
    }

    let send = arrival - travelMs;
    let targetNotificationTime = send - (warnMinutes * 60 * 1000);

    let id = Date.now();
    ops.push({
        id,
        type,
        target,
        arrival,
        send,
        warnMinutes,
        targetNotificationTime
    });

    saveOps();
    render();

    // iOS Orijinal Zamanlayıcıyı Kurmayı Tetikle
    startIosTimer(targetNotificationTime);
}

function startIosTimer(targetTime) {
    let diffMs = targetTime - Date.now();
    if (diffMs <= 0) {
        alert("Hesaplanan hatırlatma zamanı geçmiş bir tarihte!");
        return;
    }
    
    // Saniyeye çeviriyoruz
    let diffSeconds = Math.floor(diffMs / 1000);
    
    // iPhone Saat uygulamasının geri sayım zamanlayıcısını tetikleyen gizli link
    window.location.href = `clock-timer://?duration=${diffSeconds}`;
}

function del(id){
    ops = ops.filter(o => o.id !== id);
    saveOps();
    render();
}

function loop(){
    ops.forEach(o => {
        let el = document.getElementById("t_" + o.id);
        if(!el) return;

        let diff = o.send - Date.now();

        if(diff <= 0){
            el.textContent = "🚀 GÖNDER!";
            el.className = "timer err";
            return;
        }

        let s = Math.floor(diff / 1000);
        let d = Math.floor(s / 86400); s %= 86400;
        let h = Math.floor(s / 3600); s %= 3600;
        let m = Math.floor(s / 60); s %= 60;

        el.textContent = `${d > 0 ? d + 'g ' : ''}${h}s ${m}d ${s}sn`;
    });
}

function render(){
    let list = document.getElementById("list");
    list.innerHTML = "";
    ops.sort((a, b) => a.send - b.send);

    ops.forEach(o => {
        let div = document.createElement("div");
        div.className = "op-card";
        div.innerHTML = `
            <div class="op-details">
                <div class="op-type">${o.type}</div>
                <div>Hedef: <span class="op-target">${o.target}</span></div>
                <div class="op-meta">Varış: ${format(o.arrival)}</div>
                <div class="op-meta">Gönderim: <b>${format(o.send)}</b></div>
                <div class="op-meta" style="color:var(--primary)">Hatırlatıcı: ${o.warnMinutes} dk önce</div>
            </div>
            <div class="op-action">
                <div id="t_${o.id}" class="timer ok">--</div>
                <button class="btn-timer" onclick="startIosTimer(${o.targetNotificationTime})">⏰ Sayacı Yenile</button>
                <button class="btn-delete" onclick="del(${o.id})">SİL</button>
            </div>
        `;
        list.appendChild(div);
    });
}

setInterval(loop, 1000);
render();
</script>
</body>
</html>
